<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataPull</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a3a;
      --accent: #7fff6e;
      --accent2: #4fffef;
      --text: #f0f0f8;
      --muted: #6b6b88;
      --error: #ff5f6e;
      --radius: 12px;
    }

    body {
      width: 400px;
      min-height: 500px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(127,255,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127,255,110,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Site info bar */
    .site-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .site-icon {
      font-size: 14px;
    }

    .site-url {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .site-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(127,255,110,0.1);
      border: 1px solid rgba(127,255,110,0.2);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* Input section */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      resize: none;
      height: 80px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(127,255,110,0.08);
    }

    /* Quick prompts */
    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Syne', sans-serif;
    }

    .chip:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(127,255,110,0.06);
    }

    /* Scrape button */
    .scrape-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      color: #0a0a0f;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .scrape-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(127,255,110,0.25);
    }

    .scrape-btn:active {
      transform: translateY(0);
    }

    .scrape-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-icon { font-size: 16px; }

    /* Status / loading */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .status-bar.visible { display: flex; }
    .status-bar.error { border-color: var(--error); }
    .status-bar.success { border-color: var(--accent); }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Results section */
    .results-section {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .results-section.visible { display: flex; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .results-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .results-count {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    /* Table */
    .table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-height: 200px;
      overflow-y: auto;
    }

    .table-wrapper::-webkit-scrollbar { width: 4px; }
    .table-wrapper::-webkit-scrollbar-track { background: transparent; }
    .table-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead {
      background: var(--surface2);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th {
      padding: 8px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(42,42,58,0.5);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Export buttons */
    .export-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .export-btn {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .export-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(79,255,239,0.06);
    }

    .export-btn span { font-size: 14px; }

    /* Raw HTML preview */
    .raw-section {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .raw-section.visible { display: flex; }

    .raw-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .raw-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.6;
      word-break: break-all;
    }

    .raw-preview::-webkit-scrollbar { width: 3px; }
    .raw-preview::-webkit-scrollbar-thumb { background: var(--border); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding-top: 4px;
    }

    .footer-text {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted);
    }

    .phase-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent2);
      background: rgba(79,255,239,0.08);
      border: 1px solid rgba(79,255,239,0.2);
      padding: 2px 8px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">DataPull</div>
      </div>
      <div class="status-dot"></div>
    </div>

    <!-- Current site -->
    <div class="site-bar">
      <span class="site-icon">🌐</span>
      <span class="site-url" id="currentUrl">Loading page info...</span>
      <span class="site-badge" id="pageStatus">READY</span>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="input-label">What do you want to extract?</div>
      <div class="input-wrapper">
        <textarea id="userQuery" placeholder="e.g. Get me all car names and prices..."></textarea>
      </div>
      <div class="quick-prompts">
        <span class="chip" data-prompt="Get all prices and product names">💰 Prices</span>
        <span class="chip" data-prompt="Extract all email addresses and phone numbers">📧 Contacts</span>
        <span class="chip" data-prompt="Get all links and their titles">🔗 Links</span>
        <span class="chip" data-prompt="Extract all headings and main content">📄 Content</span>
        <span class="chip" data-prompt="Get all table data">📊 Tables</span>
      </div>
    </div>

    <!-- Scrape Button -->
    <button class="scrape-btn" id="scrapeBtn">
      <span class="btn-icon">⚡</span>
      Read This Page
    </button>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar">
      <div class="spinner" id="spinner"></div>
      <span class="status-text" id="statusText">Reading page content...</span>
    </div>

    <!-- Raw HTML preview (Phase 1) -->
    <div class="raw-section" id="rawSection">
      <div class="raw-label">📄 Page Content Preview</div>
      <div class="raw-preview" id="rawPreview"></div>
    </div>

    <!-- Results (Phase 2 onwards) -->
    <div class="results-section" id="resultsSection">
      <div class="results-header">
        <div class="results-title">✅ Extracted Data</div>
        <div class="results-count" id="resultsCount">0 items</div>
      </div>
      <div class="table-wrapper">
        <table id="resultsTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="export-row">
        <button class="export-btn" id="exportCsv">
          <span>📥</span> Download CSV
        </button>
        <button class="export-btn" id="exportJson">
          <span>📦</span> Download JSON
        </button>
        <button class="export-btn" id="exportExcel" style="grid-column: span 2; border-color: #4fffef; color: #4fffef; background: rgba(79,255,239,0.06);">
          <span>📊</span> Download Excel (.xlsx)
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">Phase 1</span>
      <div class="footer-dot"></div>
      <span class="footer-text">Page Reader Active</span>
      <div class="footer-dot"></div>
      <span class="phase-badge">AI Ready</span>
    </div>

  </div>
  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
